databases:
  - name: sarvex-db
    plan: free

services:
  - type: web
    name: sarvex-trader-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 1 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FINAL_SYNC_ID
        value: "2026-03-16-vFinal"
      - key: FRONTEND_URL
        value: "" # Set this to the Vercel URL in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: sarvex-db
          property: connectionString

